# Admin Service Configuration

server:
  port: ${ADMIN_SERVICE_PORT:8084}

spring:
  application:
    name: pharmacy-admin

  datasource:
    url: ${ADMIN_DB_URL:jdbc:postgresql://localhost:5432/admin_db}
    username: ${ADMIN_DB_USERNAME:postgres}
    password: ${ADMIN_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

catalog:
  service:
    url: http://localhost:${CATALOG_SERVICE_PORT:8082}
    timeout: 5000

orders:
  service:
    url: http://localhost:${ORDER_SERVICE_PORT:8083}
    timeout: 5000

inventory:
  low-stock-threshold: ${LOW_STOCK_THRESHOLD:10}
  expiry-alert-days: ${EXPIRY_ALERT_DAYS:90}

jwt:
  secret: ${JWT_SECRET:pharmacySecureJWTSecretKey2024ForHS256Algorithm256Bits}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  catalog:
    url: ${CATALOG_SERVICE_URL:http://localhost:8082}
  orders:
    url: ${ORDERS_SERVICE_URL:http://localhost:8083}
  admin:
    url: ${ADMIN_SERVICE_URL:http://localhost:8084}

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}

management:
  health:
    db:
      enabled: true

logging:
  level:
    com.pharmacy: DEBUG
