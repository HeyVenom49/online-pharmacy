# Catalog Service Configuration

server:
  port: ${CATALOG_SERVICE_PORT:8082}

spring:
  application:
    name: pharmacy-catalog

  datasource:
    url: ${CATALOG_DB_URL:jdbc:postgresql://localhost:5432/catalog_db}
    username: ${CATALOG_DB_USERNAME:postgres}
    password: ${CATALOG_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: 10MB

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:redis}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2

file:
  upload:
    path: ${UPLOAD_PATH:./uploads/prescriptions}
    allowed-types: ${ALLOWED_FILE_TYPES:application/pdf,image/jpeg,image/png}
    max-size: ${MAX_FILE_SIZE:5242880}

prescription:
  validity-days: ${PRESCRIPTION_VALIDITY_DAYS:180}
  expiry-alert-days: ${EXPIRY_ALERT_DAYS:90}

inventory:
  low-stock-threshold: ${LOW_STOCK_THRESHOLD:10}

jwt:
  secret: ${JWT_SECRET:pharmacySecureJWTSecretKey2024ForHS256Algorithm256Bits}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  catalog:
    url: ${CATALOG_SERVICE_URL:http://localhost:8082}
  orders:
    url: ${ORDERS_SERVICE_URL:http://localhost:8083}
  admin:
    url: ${ADMIN_SERVICE_URL:http://localhost:8084}

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}

management:
  health:
    rabbit:
      enabled: true
    db:
      enabled: true

logging:
  level:
    com.pharmacy: DEBUG
