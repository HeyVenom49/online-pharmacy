spring:
  application:
    name: pharmacy-eureka-test

server:
  port: 0

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka/
  server:
    enable-self-preservation: false

management:
  zipkin:
    tracing:
      endpoint: ""
