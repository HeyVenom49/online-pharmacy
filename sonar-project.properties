sonar.projectKey=online-pharmacy
sonar.projectName=Online Pharmacy
sonar.sourceEncoding=UTF-8

# When running locally against docker-compose SonarQube
sonar.host.url=http://localhost:9000

# Let Maven/JaCoCo provide coverage paths (modules generate jacoco.xml under target/site/jacoco/)
sonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/*Configuration.java,**/dto/**,**/model/**,**/entity/**,**/*Exception*.java

# Avoid scanning generated/build outputs
sonar.exclusions=**/target/**,**/build/**,**/.mvn/**,**/.git/**,**/.scannerwork/**

